<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta property="og:title" content="순간, 스튜디오">
  <meta property="og:description" content="진주에서 활동하고 있는 스튜디오입니다. 사진과 영상으로 순간을 기록합니다.">

  <meta property="og:type" content="website">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@0.263.0"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            studio: {
              bg: '#FAF7F2',
              text: '#2B2420',
              muted: '#5C534E',
              accent: '#8C7A6B',
              border: '#EBE5DC',
              card: '#FFFFFF'
            }
          },
          fontFamily: { sans: ['Pretendard', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #FAF7F2;
      color: #2B2420;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #8C7A6B; }

    /* 모바일 필터 가로 스크롤 시 스크롤바 숨김 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 세로(쇼츠) 영상 썸네일을 90도 회전시켜 16:9 카드 박스를 여백 없이 채우는 트릭.
       container-type: size로 박스 크기를 고정한 뒤, 회전 전 이미지의 width/height를
       컨테이너의 height/width(cqh/cqw)로 서로 바꿔치기하면 90도 회전 후 정확히
       원래 박스 크기(16:9)를 가득 채우게 된다. */
    .v-thumb-box { container-type: size; }
    .v-thumb-img {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100cqh;
      height: 100cqw;
      max-width: none;
      object-fit: cover;
      transform: translate(-50%, -50%) rotate(-90deg);
      transition: transform 0.5s;
    }
    .group:hover .v-thumb-img {
      transform: translate(-50%, -50%) rotate(-90deg) scale(1.05);
    }
  </style>
</head>
<body class="bg-studio-bg text-studio-text min-h-screen flex flex-col">
  <header class="bg-studio-bg border-b border-studio-border/50 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="index.html" class="flex flex-col">
        <span class="text-xl font-bold tracking-widest">순간, 스튜디오</span>
        <span class="text-[10px] tracking-widest text-studio-muted">SUNGAN STUDIO</span>
      </a>
      <nav class="hidden md:flex space-x-10 text-sm font-medium">
        <a href="photo.html" class="text-studio-muted hover:text-studio-text">사진</a>
        <a href="video.html" class="text-studio-text border-b border-studio-accent pb-1">영상</a>
        <a href="pricing.html" class="text-studio-muted hover:text-studio-text">가격 안내</a>
        <a href="about.html" class="text-studio-muted hover:text-studio-text">소개</a>
      </nav>
      <!-- 모바일 토글 버튼 -->
      <button id="mobileMenuBtn" class="md:hidden text-studio-text focus:outline-none" aria-label="메뉴 열기">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>
    </div>
    <!-- 모바일 드롭다운 메뉴 -->
    <div id="mobileMenu" class="hidden md:hidden bg-studio-bg border-b border-studio-border px-6 py-6 space-y-4 shadow-sm">
      <a href="photo.html" class="block text-base font-medium text-studio-muted hover:text-studio-text py-2">사진</a>
      <a href="video.html" class="block text-base font-medium text-studio-text py-2">영상</a>
      <a href="pricing.html" class="block text-base font-medium text-studio-muted hover:text-studio-text py-2">가격 안내</a>
      <a href="about.html" class="block text-base font-medium text-studio-muted hover:text-studio-text py-2">소개</a>
    </div>
  </header>

  <main class="flex-grow max-w-6xl mx-auto px-6 py-12 w-full">
    <div class="text-center mb-12">
      <h2 class="text-3xl font-light tracking-widest text-studio-text mb-2">VIDEO PORTFOLIO</h2>
      <p class="text-xs tracking-widest text-studio-muted uppercase mb-6" id="tagSubtitle"></p>

      <!-- 태그 필터 (단일 필터: 전체 + 태그, 다중 선택 AND. 모바일은 가로 스크롤 한 줄,
           md 이상은 중앙 정렬 줄바꿈) -->
      <div class="flex flex-nowrap md:flex-wrap justify-start md:justify-center gap-2 max-w-xl mx-auto overflow-x-auto no-scrollbar px-6 -mx-6 md:px-0 md:mx-auto" id="tagFilterContainer"></div>
    </div>

    <!-- 비디오 그리드 -->
    <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <!-- 극장 재생기 모달 (hidden 대신 display: none 레이아웃 설계로 충돌 제거) -->
  <div id="theater" class="fixed inset-0 z-50 bg-black/95 backdrop-blur-sm flex flex-col justify-between items-center p-3 md:p-6" style="display: none;">
    <div class="w-full flex justify-between items-center text-white/80 text-[10px] uppercase">
      <span>Cinema Theater</span>
      <button id="closeTheaterBtn" class="text-white/60 hover:text-white p-2 focus:outline-none"><i data-lucide="x" class="w-6 h-6"></i></button>
    </div>
    <div id="theaterFrame" class="w-full max-w-4xl aspect-video rounded-lg overflow-hidden bg-black shadow-2xl">
      <iframe id="theaterIframe" src="" class="w-full h-full border-0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <div class="text-center text-white pb-6">
      <h4 id="theaterTitle" class="text-lg font-light tracking-wide"></h4>
    </div>
  </div>

  <footer class="bg-studio-card border-t border-studio-border py-8 transition-all duration-300">
    <div class="max-w-6xl mx-auto px-6 text-center text-xs text-studio-muted">
      <p>© 순간, 스튜디오</p>
      <p class="mt-1 text-sm text-studio-muted/70">
        <a href="mailto:dj7013@naver.com" class="hover:text-studio-accent transition-colors">dj7013@naver.com</a>
        ·
        <a href="https://instagram.com/sungan__studio" target="_blank" rel="noopener noreferrer" class="hover:text-studio-accent transition-colors">@sungan__studio</a>
      </p>
    </div>
  </footer>

  <script>
    let videoData = [];
    let activeTags = new Set(); // 태그 필터 (다중 선택, AND 조건)

    // 태그 후보군 노출 순서 고정
    const TAG_ORDER = ['기업', '관공서·지자체', '매장·공간', '제품', '인물·프로필', '행사', '드론', '음식', '헬스·피트니스', '교육', '숏폼', '인터뷰'];

    // 로컬 환경을 고려한 고품질 영상 데이터 폴백 지원
    const fallbackVideos = [
      {
        "youtubeId": "L3wK6uGe7eI",
        "category": "promo",
        "title": "브랜드 홍보 필름 예시",
        "tags": ["기업"]
      },
      {
        "youtubeId": "tO01V-77v7g",
        "category": "event",
        "title": "지역 문화제 행사 스케치 예시",
        "tags": ["행사", "관공서·지자체"]
      }
    ];

    // Fisher-Yates 셔플 (페이지 로드 시 한 번만 적용)
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    fetch('videos.json')
      .then(res => res.json())
      .then(data => {
        videoData = shuffleArray(data);
        renderTagFilter();
        renderVideos();
      })
      .catch(err => {
        console.warn("로컬 환경(CORS) 혹은 videos.json 파일을 찾지 못해 샘플 데이터셋을 로드합니다.", err);
        videoData = shuffleArray(fallbackVideos);
        renderTagFilter();
        renderVideos();
      });

    function getCategoryLabel(cat) {
      const labels = {
        'promo': '홍보',
        'event': '행사 아카이빙',
        'ad': '광고/커머셜'
      };
      return labels[cat] || cat;
    }

    // 선택된 태그 전부를 만족(AND)하는 항목만 필터링
    function computeFilteredList() {
      if (activeTags.size === 0) return videoData;
      return videoData.filter(v => Array.from(activeTags).every(t => (v.tags || []).includes(t)));
    }

    // 전체 데이터에 실제로 존재하는 태그만 TAG_ORDER 순서로 추출
    function getAvailableTags() {
      const present = new Set();
      videoData.forEach(v => (v.tags || []).forEach(t => present.add(t)));
      return TAG_ORDER.filter(t => present.has(t));
    }

    // 태그 필터 렌더링 ("전체" + 태그 버튼, 태그 토글 시마다 다시 그림)
    function renderTagFilter() {
      const container = document.getElementById('tagFilterContainer');
      const available = getAvailableTags();
      document.getElementById('tagSubtitle').textContent = available.join(' · ');

      container.innerHTML = '';

      const allBtn = document.createElement('button');
      allBtn.type = 'button';
      allBtn.textContent = '전체';
      const isAllActive = activeTags.size === 0;
      allBtn.className = isAllActive
        ? 'tag-filter-btn shrink-0 px-4 py-2.5 text-xs rounded-full border border-studio-accent bg-studio-accent text-white transition-colors duration-300'
        : 'tag-filter-btn shrink-0 px-4 py-2.5 text-xs rounded-full border border-studio-border bg-studio-card text-studio-muted hover:border-studio-accent transition-colors duration-300';
      allBtn.addEventListener('click', () => {
        activeTags.clear();
        renderTagFilter();
        renderVideos();
      });
      container.appendChild(allBtn);

      available.forEach((tag) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = tag;
        const isActive = activeTags.has(tag);
        btn.className = isActive
          ? 'tag-filter-btn shrink-0 px-3 py-1.5 text-[11px] rounded-full border border-studio-accent bg-studio-accent text-white transition-colors duration-300'
          : 'tag-filter-btn shrink-0 px-3 py-1.5 text-[11px] rounded-full border border-studio-border bg-studio-card text-studio-muted hover:border-studio-accent transition-colors duration-300';
        btn.addEventListener('click', () => {
          if (activeTags.has(tag)) activeTags.delete(tag);
          else activeTags.add(tag);
          renderTagFilter();
          renderVideos();
        });
        container.appendChild(btn);
      });
    }

    function renderVideos() {
      const grid = document.getElementById('videoGrid');
      grid.innerHTML = '';
      const list = computeFilteredList();

      list.forEach(video => {
        const card = document.createElement('div');
        card.className = 'group relative overflow-hidden bg-studio-card border border-studio-border rounded-xl shadow-sm flex flex-col';
        const hqThumbUrl = `https://img.youtube.com/vi/${video.youtubeId}/hqdefault.jpg`;
        // 세로(쇼츠) 영상은 검은 띠 없는 세로 원본 썸네일(oar2)을 우선 사용
        const thumbUrl = video.vertical ? `https://i.ytimg.com/vi/${video.youtubeId}/oar2.jpg` : hqThumbUrl;

        // 썸네일 노드 생성 (카드 박스는 vertical 여부와 관계없이 16:9로 통일)
        const triggerDiv = document.createElement('div');
        triggerDiv.className = video.vertical
          ? 'relative aspect-video overflow-hidden bg-black cursor-pointer v-thumb-box'
          : 'relative aspect-video overflow-hidden bg-black cursor-pointer';

        const img = document.createElement('img');
        img.src = thumbUrl;
        img.alt = video.title;
        // 세로 영상은 썸네일을 90도 회전시켜 눕힌 뒤 16:9 박스를 여백 없이 채움
        img.className = video.vertical
          ? 'v-thumb-img opacity-95'
          : 'w-full h-full object-cover opacity-95 transition duration-500 hover:scale-105';
        img.loading = 'lazy';
        if (video.vertical) {
          // oar2 썸네일이 없는 영상일 경우 hqdefault로 폴백 (1회만 시도)
          img.addEventListener('error', function onErr() {
            img.removeEventListener('error', onErr);
            img.src = hqThumbUrl;
          });
        }

        const playOverlay = document.createElement('div');
        playOverlay.className = 'absolute inset-0 flex items-center justify-center';

        const playBtn = document.createElement('div');
        playBtn.className = 'w-12 h-12 rounded-full bg-studio-text/80 backdrop-blur-sm border border-white/20 text-white flex items-center justify-center group-hover:bg-studio-accent transition duration-300';

        const playIcon = document.createElement('i');
        playIcon.setAttribute('data-lucide', 'play');
        playIcon.className = 'ml-1 w-5 h-5 fill-current';

        playBtn.appendChild(playIcon);
        playOverlay.appendChild(playBtn);
        triggerDiv.appendChild(img);
        triggerDiv.appendChild(playOverlay);

        // 설명부 노드 생성 (textContent 속성을 통해 완전 안전하게 문자열 인젝션 차단)
        const infoDiv = document.createElement('div');
        infoDiv.className = 'p-5 flex-grow flex flex-col justify-between';

        const subDiv = document.createElement('div');
        const catSpan = document.createElement('span');
        catSpan.className = 'text-[9px] text-studio-accent font-medium uppercase mb-1 block';
        catSpan.textContent = getCategoryLabel(video.category);

        const titleH = document.createElement('h4');
        titleH.className = 'text-sm font-semibold text-studio-text tracking-wide';
        titleH.textContent = video.title;

        subDiv.appendChild(catSpan);
        subDiv.appendChild(titleH);
        infoDiv.appendChild(subDiv);

        // 태그 뱃지 (연한 배경의 작은 pill, 사이트 톤에 맞춤)
        if (video.tags && video.tags.length > 0) {
          const tagRow = document.createElement('div');
          tagRow.className = 'flex flex-wrap gap-1 mt-3';
          video.tags.forEach((tag) => {
            const pill = document.createElement('span');
            pill.className = 'text-[10px] leading-none px-2 py-1 rounded-full bg-studio-border/60 text-studio-muted whitespace-nowrap';
            pill.textContent = tag;
            tagRow.appendChild(pill);
          });
          infoDiv.appendChild(tagRow);
        }

        card.appendChild(triggerDiv);
        card.appendChild(infoDiv);

        // 자바스크립트 기반 리스너 매핑 (인라인 onclick 전면 우회)
        triggerDiv.addEventListener('click', () => {
          openTheater(video.youtubeId, video.title, video.vertical);
        });

        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    // URL 파라미터(?tag=)로 전달된 태그를 초기 필터로 적용
    (function applyTagFromUrl() {
      const tag = new URLSearchParams(window.location.search).get('tag');
      if (!tag) return;
      activeTags.add(tag);
    })();

    const theater = document.getElementById('theater');
    const theaterFrame = document.getElementById('theaterFrame');
    const tTitle = document.getElementById('theaterTitle');
    let iframe = document.getElementById('theaterIframe');

    // iframe의 src를 재사용/재할당하면 유튜브 임베드 탐색이 매번 브라우저의
    // joint session history에 별도 엔트리로 쌓여 history.back() 한 번으로
    // 모달이 닫히지 않는 문제가 생긴다. 같은 엘리먼트의 src를 바꾸는 대신
    // 매번 새 <iframe>으로 교체해 이 히스토리 오염을 피한다.
    function replaceIframe(src) {
      const fresh = document.createElement('iframe');
      fresh.id = 'theaterIframe';
      fresh.className = 'w-full h-full border-0';
      fresh.setAttribute('allow', 'autoplay; encrypted-media');
      fresh.setAttribute('allowfullscreen', '');
      if (src) fresh.src = src;
      iframe.replaceWith(fresh);
      iframe = fresh;
    }

    function openTheater(yid, title, vertical) {
      theater.style.display = 'flex';
      theaterFrame.className = vertical
        ? 'h-[85vh] max-h-[85vh] md:h-[75vh] md:max-h-[75vh] aspect-[9/16] rounded-lg overflow-hidden bg-black shadow-2xl mx-auto'
        : 'w-full max-w-4xl aspect-video rounded-lg overflow-hidden bg-black shadow-2xl';
      replaceIframe(`https://www.youtube.com/embed/${yid}?autoplay=1&rel=0`);
      tTitle.textContent = title;
      document.body.style.overflow = 'hidden';
      // 모바일 뒤로가기가 페이지 이탈 대신 극장 모달만 닫도록 히스토리 상태 추가
      history.pushState({ theater: true }, '');
    }

    // 실제 숨김 처리 (popstate 핸들러에서만 호출되어 히스토리와 화면 상태를 항상 동기화)
    function hideTheater() {
      theater.style.display = 'none';
      replaceIframe('');
      document.body.style.overflow = 'auto';
    }

    // X 버튼/배경 클릭으로 닫을 때는 pushState로 쌓은 상태를 back()으로 정리
    // (직접 hideTheater()를 호출하면 히스토리 항목이 남아 뒤로가기를 두 번 눌러야 함)
    function closeTheater() {
      if (theater.style.display === 'none') return;
      history.back();
    }

    window.addEventListener('popstate', () => {
      if (theater.style.display !== 'none') {
        hideTheater();
      }
    });

    // 모달 제어 이벤트 바인딩
    document.getElementById('closeTheaterBtn').addEventListener('click', closeTheater);

    theater.addEventListener('click', (e) => {
      if (e.target === theater || e.target === iframe.parentNode) {
        closeTheater();
      }
    });

    // 모바일 햄버거 토글
    document.getElementById('mobileMenuBtn').addEventListener('click', () => {
      const m = document.getElementById('mobileMenu');
      m.classList.toggle('hidden');
    });

    lucide.createIcons();
  </script>
  <script src="floating-cta.js"></script>
</body>
</html>
