  <a id="floatingMailBtn" href="mailto:dj7013@naver.com" aria-label="이메일 문의"

    <i data-lucide="mail" class="w-5 h-5 md:w-6 md:h-6"></i>

  <script src="assets/theme.js"></script>
  <script>
    Theme.initHeader();
    Theme.initMobileMenu();
    Theme.initImageProtection();
    Theme.initFloatingButton();

    let videoData = [];
    let activeTags = new Set(); // 태그 필터 (다중 선택, AND 조건)

    // 태그 후보군 노출 순서 고정. photo.html/video.html이 공유하는
    // data/tag-dictionary.json에서 불러온다.
    let TAG_ORDER = [];

    // 로컬 환경을 고려한 고품질 영상 데이터 폴백 지원
    const fallbackVideos = [
      {
        "youtubeId": "L3wK6uGe7eI",
        "category": "promo",
        "title": "브랜드 홍보 필름 예시",
        "tags": ["기업"]
      },
      {
        "youtubeId": "tO01V-77v7g",
        "category": "event",
        "title": "지역 문화제 행사 스케치 예시",
        "tags": ["행사", "관공서·지자체"]
      }
    ];

    // Fisher-Yates 셔플 (페이지 로드 시 한 번만 적용)
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // 태그 사전 + 영상 데이터를 함께 로드한 뒤 렌더링 (둘 다 준비된 시점에 한 번만 그림)
    const tagDictPromise = fetch('data/tag-dictionary.json')
      .then(res => res.json())
      .catch(err => {
        console.warn("data/tag-dictionary.json을 불러오지 못해 태그 정렬 순서 없이 진행합니다.", err);
        return [];
      });

    const videoDataPromise = fetch('videos.json')
      .then(res => res.json())
      .then(data => shuffleArray(data))
      .catch(err => {
        console.warn("로컬 환경(CORS) 혹은 videos.json 파일을 찾지 못해 샘플 데이터셋을 로드합니다.", err);
        return shuffleArray(fallbackVideos);
      });

    Promise.all([tagDictPromise, videoDataPromise]).then(([dict, data]) => {
      TAG_ORDER = dict;
      videoData = data;
      renderTagFilter();
      renderVideos();
    });

    function getCategoryLabel(cat) {
      const labels = {
        'promo': '홍보',
        'event': '행사 아카이빙',
        'ad': '광고/커머셜'
      };
      return labels[cat] || cat;
    }

    // 선택된 태그 전부를 만족(AND)하는 항목만 필터링
    function computeFilteredList() {
      if (activeTags.size === 0) return videoData;
      return videoData.filter(v => Array.from(activeTags).every(t => (v.tags || []).includes(t)));
    }

    // 전체 데이터에 실제로 존재하는 태그만 TAG_ORDER 순서로 추출
    function getAvailableTags() {
      const present = new Set();
      videoData.forEach(v => (v.tags || []).forEach(t => present.add(t)));
      return TAG_ORDER.filter(t => present.has(t));
    }

    // 태그 필터 렌더링 ("전체" + 태그 버튼, 태그 토글 시마다 다시 그림)
    function renderTagFilter() {
      const container = document.getElementById('tagFilterContainer');
      const available = getAvailableTags();
      document.getElementById('tagSubtitle').textContent = available.join(' · ');

      container.innerHTML = '';

      const allBtn = document.createElement('button');
      allBtn.type = 'button';
      allBtn.textContent = '전체';
      const isAllActive = activeTags.size === 0;
      allBtn.className = 'tag-filter-btn shrink-0 px-4 py-2.5 text-xs rounded-full transition-colors duration-300' + (isAllActive ? ' is-active' : '');
      allBtn.addEventListener('click', () => {
        activeTags.clear();
        renderTagFilter();
        renderVideos();
      });
      container.appendChild(allBtn);

      available.forEach((tag) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = tag;
        const isActive = activeTags.has(tag);
        btn.className = 'tag-filter-btn shrink-0 px-3 py-1.5 text-[11px] rounded-full transition-colors duration-300' + (isActive ? ' is-active' : '');
        btn.addEventListener('click', () => {
          if (activeTags.has(tag)) activeTags.delete(tag);
          else activeTags.add(tag);
          renderTagFilter();
          renderVideos();
        });
        container.appendChild(btn);
      });
    }

    function renderVideos() {
      const grid = document.getElementById('videoGrid');
      grid.innerHTML = '';
      const list = computeFilteredList();

      list.forEach(video => {
        const card = document.createElement('div');
        card.className = 'group relative card-surface overflow-hidden rounded-xl flex flex-col';
        const hqThumbUrl = `https://img.youtube.com/vi/${video.youtubeId}/hqdefault.jpg`;
        // 세로(쇼츠) 영상은 검은 띠 없는 세로 원본 썸네일(oar2)을 우선 사용
        const thumbUrl = video.vertical ? `https://i.ytimg.com/vi/${video.youtubeId}/oar2.jpg` : hqThumbUrl;

        // 썸네일 노드 생성 (카드 박스는 vertical 여부와 관계없이 16:9로 통일)
        const triggerDiv = document.createElement('div');
        triggerDiv.className = video.vertical
          ? 'relative aspect-video overflow-hidden bg-ink cursor-pointer v-thumb-box'
          : 'relative aspect-video overflow-hidden bg-ink cursor-pointer';

        const img = document.createElement('img');
        img.src = thumbUrl;
        img.alt = video.title;
        // 세로 영상은 썸네일을 90도 회전시켜 눕힌 뒤 16:9 박스를 여백 없이 채움
        img.className = video.vertical
          ? 'v-thumb-img opacity-95'
          : 'w-full h-full object-cover opacity-95 transition duration-500 group-hover:scale-105';
        img.loading = 'lazy';
        if (video.vertical) {
          // oar2 썸네일이 없는 영상일 경우 hqdefault로 폴백 (1회만 시도)
          img.addEventListener('error', function onErr() {
            img.removeEventListener('error', onErr);
            img.src = hqThumbUrl;
          });
        }

        const playOverlay = document.createElement('div');
        playOverlay.className = 'absolute inset-0 flex items-center justify-center';

        const playBtn = document.createElement('div');
        playBtn.className = 'w-12 h-12 rounded-full bg-gold text-white shadow-lg flex items-center justify-center group-hover:bg-goldhover group-hover:scale-105 transition duration-300';

        const playIcon = document.createElement('i');
        playIcon.setAttribute('data-lucide', 'play');
        playIcon.className = 'ml-1 w-5 h-5 fill-current';

        playBtn.appendChild(playIcon);
        playOverlay.appendChild(playBtn);
        triggerDiv.appendChild(img);
        triggerDiv.appendChild(playOverlay);

        // 설명부 노드 생성 (textContent 속성을 통해 완전 안전하게 문자열 인젝션 차단)
        const infoDiv = document.createElement('div');
        infoDiv.className = 'p-5 flex-grow flex flex-col justify-between';

        const subDiv = document.createElement('div');
        const catSpan = document.createElement('span');
        catSpan.className = 'text-[9px] text-gold font-semibold uppercase mb-1 block';
        catSpan.textContent = getCategoryLabel(video.category);

        const titleH = document.createElement('h4');
        titleH.className = 'text-sm font-semibold text-ink tracking-wide';
        titleH.textContent = video.title;

        subDiv.appendChild(catSpan);
        subDiv.appendChild(titleH);
        infoDiv.appendChild(subDiv);

        // 태그 뱃지 (연한 배경의 작은 pill, 사이트 톤에 맞춤)
        if (video.tags && video.tags.length > 0) {
          const tagRow = document.createElement('div');
          tagRow.className = 'flex flex-wrap gap-1 mt-3';
          video.tags.forEach((tag) => {
            const pill = document.createElement('span');
            pill.className = 'text-[10px] leading-none px-2 py-1 rounded-full bg-tint text-muted whitespace-nowrap';
            pill.textContent = tag;
            tagRow.appendChild(pill);
          });
          infoDiv.appendChild(tagRow);
        }

        card.appendChild(triggerDiv);
        card.appendChild(infoDiv);

        // 자바스크립트 기반 리스너 매핑 (인라인 onclick 전면 우회)
        triggerDiv.addEventListener('click', () => {
          openTheater(video.youtubeId, video.title, video.vertical);
        });

        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    // URL 파라미터(?tag=)로 전달된 태그를 초기 필터로 적용
    (function applyTagFromUrl() {
      const tag = new URLSearchParams(window.location.search).get('tag');
      if (!tag) return;
      activeTags.add(tag);
    })();

    const theater = document.getElementById('theater');
    const theaterFrame = document.getElementById('theaterFrame');
    const tTitle = document.getElementById('theaterTitle');
    let iframe = document.getElementById('theaterIframe');

    // iframe의 src를 재사용/재할당하면 유튜브 임베드 탐색이 매번 브라우저의
    // joint session history에 별도 엔트리로 쌓여 history.back() 한 번으로
    // 모달이 닫히지 않는 문제가 생긴다. 같은 엘리먼트의 src를 바꾸는 대신
    // 매번 새 <iframe>으로 교체해 이 히스토리 오염을 피한다.
    function replaceIframe(src) {
      const fresh = document.createElement('iframe');
      fresh.id = 'theaterIframe';
      fresh.className = 'w-full h-full border-0';
      fresh.setAttribute('allow', 'autoplay; encrypted-media');
      fresh.setAttribute('allowfullscreen', '');
      if (src) fresh.src = src;
      iframe.replaceWith(fresh);
      iframe = fresh;
    }

    function openTheater(yid, title, vertical) {
      theater.style.display = 'flex';
      theaterFrame.className = vertical
        ? 'h-[85vh] max-h-[85vh] md:h-[75vh] md:max-h-[75vh] aspect-[9/16] rounded-lg overflow-hidden bg-black shadow-2xl mx-auto'
        : 'w-full max-w-4xl aspect-video rounded-lg overflow-hidden bg-black shadow-2xl';
      replaceIframe(`https://www.youtube.com/embed/${yid}?autoplay=1&rel=0`);
      tTitle.textContent = title;
      document.body.style.overflow = 'hidden';
      // 모바일 뒤로가기가 페이지 이탈 대신 극장 모달만 닫도록 히스토리 상태 추가
      history.pushState({ theater: true }, '');
    }

    // 실제 숨김 처리 (popstate 핸들러에서만 호출되어 히스토리와 화면 상태를 항상 동기화)
    function hideTheater() {
      theater.style.display = 'none';
      replaceIframe('');
      document.body.style.overflow = 'auto';
    }

    // X 버튼/배경 클릭으로 닫을 때는 pushState로 쌓은 상태를 back()으로 정리
    // (직접 hideTheater()를 호출하면 히스토리 항목이 남아 뒤로가기를 두 번 눌러야 함)
    function closeTheater() {
      if (theater.style.display === 'none') return;
      history.back();
    }

    window.addEventListener('popstate', () => {
      if (theater.style.display !== 'none') {
        hideTheater();
      }
    });

    // 모달 제어 이벤트 바인딩
    document.getElementById('closeTheaterBtn').addEventListener('click', closeTheater);

    theater.addEventListener('click', (e) => {
      if (e.target === theater || e.target === iframe.parentNode) {
        closeTheater();
      }
    });

    lucide.createIcons();
  </script>
</body>
