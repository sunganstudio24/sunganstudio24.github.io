  <main class="flex-grow max-w-6xl mx-auto px-6 py-12 w-full">
    <div class="text-center mb-12">
      <h2 class="text-3xl font-light tracking-widest text-studio-text mb-2">PHOTO PORTFOLIO</h2>
      <p class="text-xs tracking-widest text-studio-muted uppercase mb-6" id="tagSubtitle"></p>

      <!-- 태그 필터 (단일 필터: 전체 + 태그, 다중 선택 AND. 모바일은 가로 스크롤 한 줄,
           md 이상은 중앙 정렬 줄바꿈) -->
      <div class="flex flex-nowrap md:flex-wrap justify-start md:justify-center gap-2 max-w-2xl mx-auto overflow-x-auto no-scrollbar px-6 -mx-6 md:px-0 md:mx-auto" id="tagFilterContainer"></div>
    </div>

    <!-- Masonry Grid: CSS columns 대신 JS가 각 컬럼의 실제 높이를 추적해 새 카드를
         항상 가장 짧은 컬럼에만 append하는 방식(컬럼 div들의 flex 행). CSS columns는
         새 항목이 추가될 때마다 전체 컬럼 배분을 다시 계산해 이미 렌더된 카드까지
         다른 컬럼으로 옮겨버리는 문제가 있어(무한 스크롤과 근본적으로 상충) 사용하지 않는다. -->
    <div id="photoGrid" class="flex gap-4 items-start"></div>
    <!-- 무한 스크롤 트리거용 sentinel (IntersectionObserver 관찰 대상) -->
    <div id="scrollSentinel" class="h-1 w-full"></div>
  </main>

  <!-- Lightbox (hidden과 flex가 동시 할당되지 않으며 display 속성으로 노출을 완전히 제어합니다) -->
  <div id="lightbox" class="fixed inset-0 z-50 bg-black/95 backdrop-blur-sm flex flex-col justify-between items-center p-6" style="display: none;">

    </div>
    <div class="relative max-w-4xl max-h-[75vh] w-full flex items-center justify-center">
      <button id="prevLbBtn" class="absolute left-1 md:left-0 z-20 w-11 h-11 flex items-center justify-center text-white/60 hover:text-white bg-black/30 rounded-full focus:outline-none" aria-label="이전 이미지"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
      <img id="lbImg" src="" draggable="false" class="max-w-full max-h-[75vh] object-contain rounded shadow-2xl">
      <!-- 이미지 직접 우클릭/드래그 차단용 투명 오버레이 (버튼보다 아래 z-index) -->
      <div id="lbImgShield" class="img-shield absolute inset-0 z-10"></div>
      <button id="nextLbBtn" class="absolute right-1 md:right-0 z-20 w-11 h-11 flex items-center justify-center text-white/60 hover:text-white bg-black/30 rounded-full focus:outline-none" aria-label="다음 이미지"><i data-lucide="chevron-right" class="w-6 h-6"></i></button>
    </div>
    <!-- 상단 바와 대칭을 맞추기 위한 여백용 빈 요소 -->
    <div class="h-10 invisible"></div>
  </div>

  <footer class="bg-studio-card border-t border-studio-border py-8 transition-all duration-300">
    <div class="max-w-6xl mx-auto px-6 text-center text-xs text-studio-muted">

      <p class="mt-1 text-sm text-studio-muted/70">
        <a href="mailto:dj7013@naver.com" class="hover:text-studio-accent transition-colors">dj7013@naver.com</a>
        ·
        <a href="https://instagram.com/sungan__studio" target="_blank" rel="noopener noreferrer" class="hover:text-studio-accent transition-colors">@sungan__studio</a>
      </p>
    </div>
  </footer>

  <script>
    let photoData = [];
    let activeTags = new Set(); // 태그 필터 (다중 선택, AND 조건). 비어 있으면 "전체"
    let filteredList = [];
    let currentLbIndex = 0;
    let renderedCount = 0;
    const BATCH_SIZE = 12;

    // 태그 후보군 노출 순서 고정 (알파벳/가나다 정렬 대신 의미 단위로 묶어서 보여줌).
    // photo.html/video.html이 공유하는 data/tag-dictionary.json에서 불러온다.
    let TAG_ORDER = [];

    // 로컬 CORS 에러 대비용 고품질 Unsplash 목업 이미지 폴백
    const fallbackImages = [
      {
        "file": "https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80",
        "category": "scenery",
        "title": "공간·풍경 대표 예시",
        "tags": ["관공서·지자체"]
      },
      {
        "file": "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=800&q=80",
        "category": "profile",
        "title": "프로필 촬영 대표 예시",
        "tags": ["인물·프로필"]
      }
    ];

    // Fisher-Yates 셔플 (페이지 로드 시 한 번만 적용)
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // 태그 사전 + 이미지 데이터를 함께 로드한 뒤 렌더링 (둘 다 준비된 시점에 한 번만 그림)
    const tagDictPromise = fetch('data/tag-dictionary.json')
      .then(res => res.json())
      .catch(err => {
        console.warn("data/tag-dictionary.json을 불러오지 못해 태그 정렬 순서 없이 진행합니다.", err);
        return [];
      });

    const photoDataPromise = fetch('images.json')
      .then(res => res.json())
      .then(data => shuffleArray(data))
      .catch(err => {
        console.warn("로컬 환경(CORS) 혹은 images.json 파일을 찾지 못해 원활한 테스트를 위한 샘플 이미지를 로드합니다.", err);
        return shuffleArray(fallbackImages);
      });

    Promise.all([tagDictPromise, photoDataPromise]).then(([dict, data]) => {
      TAG_ORDER = dict;
      photoData = data;
      renderTagFilter();
      renderPhotos();
    });

    // 뷰포트 폭에 따른 컬럼 수 (기존 columns-1 sm:columns-2 md:columns-3 lg:columns-4와
    // 동일한 Tailwind 브레이크포인트 기준: sm=640px, md=768px, lg=1024px)
    function getColumnCount() {
      const w = window.innerWidth;
      if (w >= 1024) return 4;
      if (w >= 768) return 3;
      if (w >= 640) return 2;
      return 1;
    }

    let columnEls = [];
    let columnHeights = []; // 각 컬럼에 누적된 실제 렌더 높이(px) 추적
    let renderGeneration = 0; // 필터 변경/리사이즈로 그리드가 재구성될 때마다 증가
    const COLUMN_GAP = 16; // Tailwind gap-4(1rem) = 16px, 컬럼 높이 계산에 동일하게 반영

    // 현재 컬럼 수에 맞춰 빈 컬럼 div들을 새로 만든다 (필터 변경/초기 로드/브레이크포인트
    // 전환 시에만 호출 - 스크롤로 인한 배치 추가에서는 절대 호출하지 않는다)
    function buildColumns() {
      renderGeneration++;
      const grid = document.getElementById('photoGrid');
      grid.innerHTML = '';
      const count = getColumnCount();
      columnEls = [];
      columnHeights = new Array(count).fill(0);
      for (let i = 0; i < count; i++) {
        const col = document.createElement('div');
        col.className = 'flex-1 min-w-0 flex flex-col gap-4';
        grid.appendChild(col);
        columnEls.push(col);
      }
    }

    // 현재 누적 높이가 가장 낮은(짧은) 컬럼의 인덱스를 반환
    function shortestColumnIndex() {
      let idx = 0;
      for (let i = 1; i < columnHeights.length; i++) {
        if (columnHeights[i] < columnHeights[idx]) idx = i;
      }
      return idx;
    }

    // 카드 하단 태그 뱃지 한 줄의 대략적인 높이(px). masonry 높이 계산에
    // 이미지 실제 비율과 함께 더해 컬럼 배치가 어긋나지 않게 한다.
    const TAG_ROW_ESTIMATE = 34;

    function createPhotoCard(photo, idx) {
      const card = document.createElement('div');
      card.className = 'gallery-card overflow-hidden rounded-xl border border-studio-border/50 bg-studio-card cursor-pointer';

      // 이미지 태그 (hover:scale-105 바인딩)
      const img = document.createElement('img');
      img.src = photo.file;
      img.alt = photo.title;
      img.className = 'w-full h-auto object-cover transition duration-500 hover:scale-105';
      img.loading = 'lazy';
      img.draggable = false;
      img.dataset.filteredIdx = idx; // 리사이즈 재배치 시 실제 종횡비를 idx로 역참조하기 위함

      card.appendChild(img);

      // 태그 뱃지 (연한 배경의 작은 pill, 사이트 톤에 맞춤)
      if (photo.tags && photo.tags.length > 0) {
        const tagRow = document.createElement('div');
        tagRow.className = 'flex flex-wrap gap-1 p-2';
        photo.tags.forEach((tag) => {
          const pill = document.createElement('span');
          pill.className = 'text-[10px] leading-none px-2 py-1 rounded-full bg-studio-border/60 text-studio-muted whitespace-nowrap';
          pill.textContent = tag;
          tagRow.appendChild(pill);
        });
        card.appendChild(tagRow);
      }

      // 자바스크립트 수동 이벤트 리스너 바인딩 (인라인 onClick 전면 배제)
      card.addEventListener('click', () => openLb(idx));
      return card;
    }

    // 이미지의 실제 크기를 먼저 확인한 뒤, 그 시점의 컬럼 높이를 기준으로
    // 가장 짧은 컬럼에 배치한다. DOM에 아직 삽입되지 않은 별도의 Image()로
    // 미리 로드해 naturalWidth/naturalHeight를 즉시 신뢰할 수 있게 하며,
    // 이 덕분에 "로드 전이라 높이가 0으로 측정되어 한쪽 컬럼에 쏠리는" 문제가
    // 근본적으로 생기지 않는다. 배치 완료 후에는 해당 카드를 다시 옮기지 않는다.
    function placeCardWhenReady(photo, idx) {
      const myGeneration = renderGeneration;
      const preload = new Image();

      function place(aspectRatio) {
        if (myGeneration !== renderGeneration) return; // 그 사이 필터/리사이즈로 재구성됨 - 폐기
        const colIndex = shortestColumnIndex();
        const colEl = columnEls[colIndex];
        const colWidth = colEl.getBoundingClientRect().width;
        const tagRowHeight = (photo.tags && photo.tags.length > 0) ? TAG_ROW_ESTIMATE : 0;
        columnHeights[colIndex] += (colWidth / aspectRatio) + tagRowHeight + COLUMN_GAP;
        colEl.appendChild(createPhotoCard(photo, idx));
        lucide.createIcons();
      }

      preload.onload = () => place(preload.naturalWidth / preload.naturalHeight);
      preload.onerror = () => place(4 / 3); // 로드 실패 시 기본 비율로 폴백
      preload.src = photo.file;
    }

    // 선택된 태그를 전부 만족(AND)하는 항목만 필터링. 태그 미선택 시 전체.
    function computeFilteredList() {
      if (activeTags.size === 0) return photoData;
      return photoData.filter(p => Array.from(activeTags).every(t => (p.tags || []).includes(t)));
    }

    function renderPhotos() {
      filteredList = computeFilteredList();
      renderedCount = 0;
      buildColumns();
      appendNextBatch();
    }

    // 전체 데이터에 실제로 존재하는 태그만 TAG_ORDER 순서로 추출
    function getAvailableTags() {
      const present = new Set();
      photoData.forEach(p => (p.tags || []).forEach(t => present.add(t)));
      return TAG_ORDER.filter(t => present.has(t));
    }

    // 단일 태그 필터 렌더링: "전체" + 태그 버튼들, 다중 선택(AND). 태그 토글 시마다 다시 그림.
    function renderTagFilter() {
      const container = document.getElementById('tagFilterContainer');
      const available = getAvailableTags();

      const subtitle = document.getElementById('tagSubtitle');
      if (subtitle) subtitle.textContent = available.join(' · ');

      container.innerHTML = '';

      const allBtn = document.createElement('button');
      allBtn.type = 'button';
      allBtn.textContent = '전체';
      const isAllActive = activeTags.size === 0;
      allBtn.className = isAllActive
        ? 'tag-filter-btn shrink-0 px-3 py-1.5 text-[11px] rounded-full border border-studio-accent bg-studio-accent text-white transition-colors duration-300'
        : 'tag-filter-btn shrink-0 px-3 py-1.5 text-[11px] rounded-full border border-studio-border bg-studio-card text-studio-muted hover:border-studio-accent transition-colors duration-300';
      allBtn.addEventListener('click', () => {
        activeTags.clear();
        renderTagFilter();
        renderPhotos();
      });
      container.appendChild(allBtn);

      available.forEach((tag) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = tag;
        const isActive = activeTags.has(tag);
        btn.className = isActive
          ? 'tag-filter-btn shrink-0 px-3 py-1.5 text-[11px] rounded-full border border-studio-accent bg-studio-accent text-white transition-colors duration-300'
          : 'tag-filter-btn shrink-0 px-3 py-1.5 text-[11px] rounded-full border border-studio-border bg-studio-card text-studio-muted hover:border-studio-accent transition-colors duration-300';
        btn.addEventListener('click', () => {
          if (activeTags.has(tag)) activeTags.delete(tag);
          else activeTags.add(tag);
          renderTagFilter();
          renderPhotos();
        });
        container.appendChild(btn);
      });
    }

    // 필터된 전체 목록(filteredList) 중 다음 BATCH_SIZE개를, 각 이미지 로드 완료
    // 시점에 가장 짧은 컬럼으로 배치한다. 기존에 렌더된 카드는 절대 이동/재생성하지 않는다.
    function appendNextBatch() {
      const nextSlice = filteredList.slice(renderedCount, renderedCount + BATCH_SIZE);

      nextSlice.forEach((photo, i) => {
        const idx = renderedCount + i; // filteredList 기준 실제 인덱스 (라이트박스 내비게이션용)
        placeCardWhenReady(photo, idx);
      });
      renderedCount += nextSlice.length;
    }

    // 창 크기 변경으로 컬럼 수 자체가 바뀌어야 할 때만(예: 데스크톱 창 리사이즈,
    // 모바일 회전) 컬럼을 다시 만들고, 지금까지 로드된 항목만 재배치한다.
    // (renderedCount/필터/스크롤 진행 상태는 그대로 유지 - 다시 불러오지 않음)
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (getColumnCount() === columnEls.length) return;

        // 재구성 전에 이미 로드된 이미지들의 실제 종횡비를 idx 기준으로 캡처
        // (DOM 순회 순서는 컬럼별로 묶여 있어 filteredList 순서와 다르므로
        // data-filtered-idx로 정확히 역참조한다)
        const aspectByIdx = {};
        document.querySelectorAll('#photoGrid img').forEach((img) => {
          const idx = Number(img.dataset.filteredIdx);
          aspectByIdx[idx] = (img.naturalWidth || 4) / (img.naturalHeight || 3);
        });

        const loadedSoFar = filteredList.slice(0, renderedCount);
        buildColumns();
        loadedSoFar.forEach((photo, idx) => {
          const aspectRatio = aspectByIdx[idx] || 4 / 3;
          const colIndex = shortestColumnIndex();
          const colEl = columnEls[colIndex];
          const colWidth = colEl.getBoundingClientRect().width;
          const tagRowHeight = (photo.tags && photo.tags.length > 0) ? TAG_ROW_ESTIMATE : 0;
          columnHeights[colIndex] += (colWidth / aspectRatio) + tagRowHeight + COLUMN_GAP;
          colEl.appendChild(createPhotoCard(photo, idx));
        });
        lucide.createIcons();
      }, 200);
    });

    // 무한 스크롤: sentinel이 뷰포트 200px 이내로 들어오면 다음 12장 추가
    const scrollSentinel = document.getElementById('scrollSentinel');

    // IntersectionObserver(rootMargin: 200px)로 sentinel과의 근접 여부를 판단하되,
    // 스크롤이 멈출 때마다 매번 새 인스턴스로 한 번만 관찰하고 바로 해제한다.
    // (오래 살아있는 단일 인스턴스로 계속 관찰하면, 최초 관찰 시 강제로 발생하는
    // 콜백 이후 실제 스크롤로 인한 재교차를 감지하지 못하는 환경이 있어 안전하게
    // 매 스크롤 틱마다 새로 확인한다.)
    function checkSentinelProximity() {
      if (renderedCount >= filteredList.length) return;
      const obs = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && window.scrollY > 0 && renderedCount < filteredList.length) {
          appendNextBatch();
          // 배치를 추가해도 이미지가 아직 로드되기 전이라 문서 높이가 그대로일 수 있고,
          // 이미 스크롤 최대치에 도달해 있으면 사용자의 추가 스크롤(=새 scroll 이벤트) 자체가
          // 더 이상 발생하지 않아 무한 로딩이 멈춰버린다. 레이아웃이 반영된 다음 프레임에
          // sentinel이 여전히 가까우면 계속 이어서 불러온다.
          requestAnimationFrame(checkSentinelProximity);
        }
        obs.disconnect();
      }, { rootMargin: '200px' });
      obs.observe(scrollSentinel);
    }

    let scrollCheckQueued = false;
    window.addEventListener('scroll', () => {
      if (scrollCheckQueued) return;
      scrollCheckQueued = true;
      requestAnimationFrame(() => {
        checkSentinelProximity();
        scrollCheckQueued = false;
      });
    }, { passive: true });

    // URL 파라미터(?tag=)로 전달된 태그를 초기 필터로 적용
    // (renderTagFilter()가 photoData 로드 후 호출될 때 activeTags를 반영해 그려준다)
    (function applyTagFromUrl() {
      const tag = new URLSearchParams(window.location.search).get('tag');
      if (!tag) return;
      activeTags.add(tag);
    })();

    // 라이트박스 제어 로직 (style.display로 완벽 제어)
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbIndex = document.getElementById('lbIndex');

    function openLb(idx) {
      currentLbIndex = idx;
      lb.style.display = 'flex';
      document.body.style.overflow = 'hidden';
      updateLb();
      // 모바일 뒤로가기가 페이지 이탈 대신 라이트박스만 닫도록 히스토리 상태 추가
      history.pushState({ lightbox: true }, '');
    }

    // 실제 숨김 처리 (popstate 핸들러에서만 호출되어 히스토리와 화면 상태를 항상 동기화)
    function hideLb() {
      lb.style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    // X 버튼/배경 클릭/ESC로 닫을 때는 pushState로 쌓은 상태를 back()으로 정리
    // (직접 hideLb()를 호출하면 히스토리 항목이 남아 뒤로가기를 두 번 눌러야 함)
    function closeLb() {
      if (lb.style.display === 'none') return;
      history.back();
    }

    window.addEventListener('popstate', () => {
      if (lb.style.display !== 'none') {
        hideLb();
      }
    });

    function updateLb() {
      const item = filteredList[currentLbIndex];
      if (!item) return;
      lbImg.src = item.file;
      lbIndex.textContent = `${currentLbIndex + 1} / ${filteredList.length}`;
    }

    // 라이트박스 리스너 등록
    document.getElementById('closeLbBtn').addEventListener('click', closeLb);
    document.getElementById('prevLbBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      currentLbIndex = (currentLbIndex - 1 + filteredList.length) % filteredList.length;
      updateLb();
    });
    document.getElementById('nextLbBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      currentLbIndex = (currentLbIndex + 1) % filteredList.length;
      updateLb();
    });

    const lbImgShield = document.getElementById('lbImgShield');
    lb.addEventListener('click', (e) => {
      if (e.target === lb || e.target === lbImg.parentNode || e.target === lbImgShield) {
        closeLb();
      }
    });

    // 모바일 스와이프로 이전/다음 이미지 이동
    let touchStartX = 0;
    let touchStartY = 0;
    lb.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    lb.addEventListener('touchend', (e) => {
      const deltaX = e.changedTouches[0].screenX - touchStartX;
      const deltaY = e.changedTouches[0].screenY - touchStartY;
      const SWIPE_THRESHOLD = 50;
      if (Math.abs(deltaX) > SWIPE_THRESHOLD && Math.abs(deltaX) > Math.abs(deltaY)) {
        if (deltaX < 0) {
          currentLbIndex = (currentLbIndex + 1) % filteredList.length;
        } else {
          currentLbIndex = (currentLbIndex - 1 + filteredList.length) % filteredList.length;
        }
        updateLb();
      }
    }, { passive: true });

    // 이미지(및 보호 오버레이)에만 우클릭 방지 적용, 일반 텍스트 영역은 우클릭 유지
    document.addEventListener('contextmenu', (e) => {
      if (e.target.tagName === 'IMG' || e.target.classList.contains('img-shield')) {
        e.preventDefault();
      }
    });

    // ESC 및 좌우 키 바인딩
    window.addEventListener('keydown', (e) => {
      if (lb.style.display === 'none') return;
      if (e.key === 'Escape') closeLb();
      if (e.key === 'ArrowLeft') {
        currentLbIndex = (currentLbIndex - 1 + filteredList.length) % filteredList.length;
        updateLb();
      }
      if (e.key === 'ArrowRight') {
        currentLbIndex = (currentLbIndex + 1) % filteredList.length;
        updateLb();
      }
    });

    // 모바일 햄버거 토글
    document.getElementById('mobileMenuBtn').addEventListener('click', () => {
      const m = document.getElementById('mobileMenu');
      m.classList.toggle('hidden');
    });

    lucide.createIcons();
  </script>
  <script src="floating-cta.js"></script>
</body>
</html>
